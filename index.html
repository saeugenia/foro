<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Edu - Plataforma Institucional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { primary: '#0f172a', accent: '#4f46e5', success: '#10b981', danger: '#ef4444' } 
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style> 
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } 
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <header class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-40 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-accent text-white p-2 rounded-lg">
                    <i class="fa-solid fa-graduation-cap text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl text-primary leading-tight">Conecta Edu</h1>
                    <span class="text-xs text-accent font-semibold tracking-wide uppercase">Comunidad Escolar</span>
                </div>
            </div>
            <div>
                <button id="btn-login" class="bg-white border hover:bg-slate-50 text-primary font-semibold py-2 px-5 rounded-full text-sm transition-all shadow-sm flex items-center gap-2">
                    <i class="fa-brands fa-google text-red-500"></i> Entrar
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        
        <div id="user-panel" class="hidden bg-gradient-to-r from-indigo-50 to-blue-50 border border-indigo-100 rounded-2xl p-5 mb-8 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <img id="user-avatar" src="" alt="Avatar" class="w-12 h-12 rounded-full border-2 border-white shadow-sm">
                <div>
                    <p class="text-base font-bold text-slate-800" id="user-greeting">Hola, Usuario</p>
                    <span id="user-role-badge" class="inline-block mt-1 px-2.5 py-0.5 rounded-full text-xs font-bold border border-opacity-50">Rol</span>
                </div>
            </div>
            <button id="btn-logout" class="text-slate-500 hover:text-red-600 text-sm font-bold transition-colors">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Salir
            </button>
        </div>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 relative overflow-hidden">
            <div id="form-overlay" class="absolute inset-0 bg-white/70 backdrop-blur-[2px] z-10 flex flex-col items-center justify-center">
                <i class="fa-solid fa-lock text-3xl text-slate-400 mb-2"></i>
                <p class="text-slate-600 font-semibold text-sm">Inicia sesión con Google para publicar</p>
            </div>

            <h2 class="text-lg font-bold text-primary mb-4 flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-accent"></i> Crear Publicación</h2>
            <form id="post-form" class="space-y-4 relative z-0">
                <input type="text" id="post-title" placeholder="Título de la publicación..." class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-accent outline-none bg-slate-50" required>
                <textarea id="post-body" rows="3" placeholder="¿Qué deseas compartir con la comunidad?" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-accent outline-none bg-slate-50" required></textarea>
                
                <div class="p-4 border border-dashed border-slate-300 rounded-xl bg-slate-50">
                    <label class="block text-sm font-semibold text-slate-700 mb-2"><i class="fa-solid fa-paperclip text-slate-400"></i> Adjuntar Archivo (PDF, DOC, JPG, PNG)</label>
                    <input type="file" id="post-file" accept=".pdf,.doc,.docx,.jpg,.png,.jpeg" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-accent hover:file:bg-indigo-100 cursor-pointer">
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="bg-accent hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl transition-colors shadow-md flex items-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i> Publicar
                    </button>
                </div>
            </form>
        </section>

        <section>
            <h2 class="text-xl font-bold text-primary flex items-center gap-2 mb-6"><i class="fa-regular fa-comments text-accent"></i> Muro Institucional</h2>
            <div id="posts-container" class="space-y-5">
                <div class="text-center py-10 text-slate-500">
                    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>Cargando muro...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-onboarding" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-primary">Completa tu Perfil</h2>
                <p class="text-sm text-slate-500">Para continuar usando tu cuenta de Gmail, completa estos datos.</p>
            </div>
            
            <form id="onboarding-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tu rol en la comunidad</label>
                    <select id="user-type" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-accent bg-slate-50 outline-none" required>
                        <option value="">Selecciona una opción...</option>
                        <option value="Apoderado">Soy Apoderado</option>
                        <option value="Estudiante">Soy Estudiante</option>
                    </select>
                </div>

                <div id="extra-fields" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Tu Nombre Completo</label>
                        <input type="text" id="user-name" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Tu Edad</label>
                        <input type="number" id="user-age" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50" required>
                    </div>
                    
                    <div id="student-name-group" class="hidden">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre del Estudiante</label>
                        <input type="text" id="student-name" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1" id="course-label">Curso</label>
                        <input type="text" id="user-course" placeholder="Ej: 1° Básico" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50" required>
                    </div>
                </div>

                <button type="submit" id="btn-submit-onboarding" class="w-full bg-success hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl transition-colors mt-6 hidden">
                    Guardar y Entrar
                </button>
            </form>
        </div>
    </div>
    
    <div id="modal-edit" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-lg w-full">
            <h2 class="text-xl font-bold text-primary mb-4 flex items-center gap-2"><i class="fa-solid fa-pen text-accent"></i> Editar Publicación</h2>
            <form id="edit-form" class="space-y-4">
                <input type="hidden" id="edit-post-id">
                <input type="text" id="edit-post-title" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50" required>
                <textarea id="edit-post-body" rows="4" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50" required></textarea>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" id="btn-cancel-edit" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-xl font-semibold transition">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-accent text-white rounded-xl font-bold hover:bg-indigo-700 transition">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-analytics.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, deleteDoc, updateDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

        // TU CONFIGURACIÓN EXACTA
        const firebaseConfig = {
            apiKey: "AIzaSyCOfNPxNcrxGBTQSjUXppN9GJnEQfcrDm4",
            authDomain: "foro-conectaedu.firebaseapp.com",
            projectId: "foro-conectaedu",
            storageBucket: "foro-conectaedu.firebasestorage.app",
            messagingSenderId: "183234856524",
            appId: "1:183234856524:web:9cef8e98008740431196e9",
            measurementId: "G-VWS4D8DM7B"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let userData = null;
        let postsArray = [];

        // DOM
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const userPanel = document.getElementById('user-panel');
        const formOverlay = document.getElementById('form-overlay');
        const postsContainer = document.getElementById('posts-container');
        const postForm = document.getElementById('post-form');
        const modalOnboarding = document.getElementById('modal-onboarding');

        // Autenticación
        btnLogin.addEventListener('click', async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (error) { Swal.fire('Error', error.message, 'error'); }
        });

        btnLogout.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const email = user.email;

                // FUNCIONARIO (Admin)
                if (email.endsWith('@slepcolchagua.cl')) {
                    userData = { rol: 'Funcionario', nombre: user.displayName, email };
                    await setDoc(doc(db, "users", user.uid), userData, { merge: true });
                    renderUI();
                } 
                // APODERADO / ESTUDIANTE
                else if (email.endsWith('@gmail.com')) {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        userData = docSnap.data();
                        renderUI();
                    } else {
                        modalOnboarding.classList.remove('hidden');
                    }
                } 
                else {
                    signOut(auth);
                    Swal.fire('Acceso Denegado', 'Solo correos institucionales o @gmail.com', 'error');
                }
            } else {
                currentUser = null;
                userData = null;
                renderUI();
            }
        });

        // Lógica Onboarding
        document.getElementById('user-type').addEventListener('change', (e) => {
            const extraFields = document.getElementById('extra-fields');
            const studentGroup = document.getElementById('student-name-group');
            const btnSubmit = document.getElementById('btn-submit-onboarding');
            
            if (!e.target.value) {
                extraFields.classList.add('hidden'); btnSubmit.classList.add('hidden'); return;
            }
            
            extraFields.classList.remove('hidden');
            btnSubmit.classList.remove('hidden');

            if (e.target.value === 'Apoderado') {
                studentGroup.classList.remove('hidden');
                document.getElementById('student-name').required = true;
                document.getElementById('course-label').innerText = 'Curso del Estudiante';
            } else {
                studentGroup.classList.add('hidden');
                document.getElementById('student-name').required = false;
                document.getElementById('course-label').innerText = 'Tu Curso';
            }
        });

        document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rol = document.getElementById('user-type').value;
            userData = {
                rol,
                nombre: document.getElementById('user-name').value,
                edad: document.getElementById('user-age').value,
                curso: document.getElementById('user-course').value,
                estudiante: rol === 'Apoderado' ? document.getElementById('student-name').value : '',
                email: currentUser.email
            };
            
            await setDoc(doc(db, "users", currentUser.uid), userData);
            modalOnboarding.classList.add('hidden');
            Swal.fire('¡Listo!', 'Bienvenido a Conecta Edu.', 'success');
            renderUI();
        });

        // Render UI
        function renderUI() {
            if (currentUser && userData) {
                btnLogin.classList.add('hidden');
                userPanel.classList.remove('hidden');
                formOverlay.classList.add('hidden');
                
                document.getElementById('user-greeting').innerText = `Hola, ${userData.nombre}`;
                document.getElementById('user-avatar').src = currentUser.photoURL || `https://ui-avatars.com/api/?name=${userData.nombre}&background=4f46e5&color=fff`;
                
                const roleBadge = document.getElementById('user-role-badge');
                let badgeColor = userData.rol === 'Funcionario' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700';
                roleBadge.className = `inline-block mt-1 px-2.5 py-0.5 rounded-full text-xs font-bold border ${badgeColor}`;
                roleBadge.innerText = userData.rol;
            } else {
                btnLogin.classList.remove('hidden');
                userPanel.classList.add('hidden');
                formOverlay.classList.remove('hidden');
            }
        }

        // Publicar Post
        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser || !userData) return;

            const fileInput = document.getElementById('post-file');
            let fileUrl = null;
            let fileName = null;

            Swal.fire({ title: 'Publicando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileName = file.name;
                const storageRef = ref(storage, `archivos/${Date.now()}_${file.name}`);
                try {
                    const snapshot = await uploadBytes(storageRef, file);
                    fileUrl = await getDownloadURL(snapshot.ref);
                } catch (error) {
                    return Swal.fire('Error', 'Hubo un error subiendo el archivo. Revisa los permisos de Storage.', 'error');
                }
            }

            await addDoc(collection(db, "posts"), {
                title: document.getElementById('post-title').value,
                body: document.getElementById('post-body').value,
                authorId: currentUser.uid,
                authorName: userData.nombre,
                role: userData.rol,
                date: new Date().toISOString(),
                fileUrl,
                fileName
            });

            postForm.reset();
            Swal.fire('¡Publicado!', 'El mensaje ha sido añadido al muro.', 'success');
        });

        // Cargar Posts en Tiempo Real
        const q = query(collection(db, "posts"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            postsArray = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderPosts();
        });

        function renderPosts() {
            postsContainer.innerHTML = '';
            if (postsArray.length === 0) {
                postsContainer.innerHTML = `<div class="text-center py-10 text-slate-500 bg-white rounded-2xl border">Sin publicaciones.</div>`;
                return;
            }

            postsArray.forEach(post => {
                const isAuthor = currentUser && post.authorId === currentUser.uid;
                const isFuncionario = userData && userData.rol === 'Funcionario';
                
                const canDelete = isFuncionario; // Solo Funcionarios pueden borrar
                const canEdit = isAuthor; // Solo el autor puede editar

                let fileHtml = post.fileUrl ? `
                    <div class="mt-4 p-3 bg-slate-50 border border-slate-200 rounded-xl flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-file text-accent text-xl"></i>
                            <span class="text-sm font-semibold truncate">${post.fileName}</span>
                        </div>
                        <a href="${post.fileUrl}" target="_blank" class="text-accent font-bold text-sm"><i class="fa-solid fa-download"></i> Bajar</a>
                    </div>` : '';

                let buttonsHtml = '';
                if (canEdit || canDelete) {
                    buttonsHtml = `<div class="flex gap-2 mt-4 pt-4 border-t border-slate-100 justify-end">`;
                    if (canEdit) buttonsHtml += `<button onclick="window.openEdit('${post.id}')" class="text-indigo-600 font-bold text-sm px-3"><i class="fa-solid fa-pen"></i> Editar</button>`;
                    if (canDelete) buttonsHtml += `<button onclick="window.deletePost('${post.id}')" class="text-red-500 font-bold text-sm px-3"><i class="fa-solid fa-trash"></i> Borrar</button>`;
                    buttonsHtml += `</div>`;
                }

                const postEl = document.createElement('div');
                postEl.className = 'bg-white rounded-2xl shadow-sm border border-slate-200 p-6';
                postEl.innerHTML = `
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-bold">
                            ${post.authorName.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <h4 class="font-bold text-primary leading-tight">${post.authorName}</h4>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full uppercase bg-slate-100">${post.role}</span>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-2">${post.title}</h3>
                    <p class="text-slate-600 text-sm whitespace-pre-line">${post.body}</p>
                    ${fileHtml}
                    ${buttonsHtml}
                `;
                postsContainer.appendChild(postEl);
            });
        }

        // Lógicas Globales (Ventana)
        window.deletePost = async (id) => {
            const res = await Swal.fire({ title: '¿Borrar post?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Sí, borrar' });
            if (res.isConfirmed) await deleteDoc(doc(db, "posts", id));
        };

        window.openEdit = (id) => {
            const post = postsArray.find(p => p.id === id);
            document.getElementById('edit-post-id').value = post.id;
            document.getElementById('edit-post-title').value = post.title;
            document.getElementById('edit-post-body').value = post.body;
            document.getElementById('modal-edit').classList.remove('hidden');
        };

        document.getElementById('btn-cancel-edit').addEventListener('click', () => {
            document.getElementById('modal-edit').classList.add('hidden');
        });

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-post-id').value;
            await updateDoc(doc(db, "posts", id), {
                title: document.getElementById('edit-post-title').value,
                body: document.getElementById('edit-post-body').value
            });
            document.getElementById('modal-edit').classList.add('hidden');
            Swal.fire('Editado', 'Publicación actualizada', 'success');
        });
    </script>
</body>
</html>
